<!DOCTYPE html>
<html><head><title>OAuth Callback</title></head>
<body>
<h2>Authorization Code</h2>
<p>Copy this code and give it to Levi:</p>
<pre id="code"></pre>
<script>
const params = new URLSearchParams(window.location.search);
document.getElementById('code').textContent = params.get('code') || 'No code received. Full URL: ' + window.location.href;
</script>
</body></html>
